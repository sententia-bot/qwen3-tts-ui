server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://qwen3-tts-api:8888/api/;
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }
    location /reference-audio {
        proxy_pass http://qwen3-tts-api:8888/reference-audio;
        proxy_read_timeout 30s;
    }
    location /status {
        proxy_pass http://qwen3-tts-api:8888/status;
        proxy_read_timeout 10s;
    }
    location /info {
        proxy_pass http://qwen3-tts-api:8888/info;
        proxy_read_timeout 10s;
    }
}
