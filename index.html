<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen3 TTS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Qwen3 TTS</h1>


    <label>Text</label>
    <div class="text-input-wrap">
      <textarea id="text" rows="6" placeholder="Type text to synthesize..."></textarea>
      <button id="textFileBtn" type="button" class="icon-btn secondary" title="Load text file" aria-label="Load text file">📄</button>
      <input id="textFileInput" type="file" accept=".txt,.md,text/plain,text/markdown" hidden />
    </div>

    <div class="mode-switch" id="modeSwitch" role="radiogroup" aria-label="Synthesis mode">
      <button type="button" class="mode-btn active" data-mode="clone" aria-checked="true">Clone</button>
      <button type="button" class="mode-btn" data-mode="design" aria-checked="false">Design</button>
    </div>

    <div class="mode-switch secondary" id="sizeSwitch" role="radiogroup" aria-label="Model size">
      <button type="button" class="mode-btn active" data-size="quality" aria-checked="true">Quality (1.7B)</button>
      <button type="button" class="mode-btn" data-size="fast" aria-checked="false">Fast (0.6B)</button>
    </div>

    <div class="grid">
      <div>
        <label>Language</label>
        <select id="language"></select>
      </div>
      <div id="selectedRefWrap">
        <label>Selected reference</label>
        <div id="selectedRef" class="selected-ref">None</div>
      </div>
    </div>

    <section id="designSection" class="design-section hidden">
      <label for="voiceDescription">Describe the voice</label>
      <textarea id="voiceDescription" rows="3" placeholder="deep British male, slightly raspy, calm pace"></textarea>
    </section>

    <section id="referenceSection" class="ref-audio">
      <h2>Reference audio</h2>
      <div class="grid">
        <div>
          <label>Use reference file</label>
          <select id="referenceAudio">
            <option value="">None</option>
          </select>
        </div>
        <div>
          <label>Upload new file</label>
          <input id="uploadFile" type="file" accept="audio/*" />
        </div>
      </div>
      <div class="actions">
        <button id="uploadBtn">Upload</button>
        <button id="manageVoicesBtn" class="secondary">Manage Voices</button>
      </div>
      <section id="manageVoicesPanel" class="manage-voices hidden">
        <div id="voiceList" class="voice-list"></div>
      </section>
    </section>

    <div class="actions">
      <button id="generateBtn">Generate</button>
      <button id="downloadBtn" class="secondary" disabled>Download</button>
      <button id="saveVoiceBtn" class="secondary" disabled>Save as Voice</button>
    </div>

    <section id="progressWrap" class="progress-wrap hidden" aria-live="polite">
      <div id="progressText" class="progress-text"></div>
    </section>

    <audio id="player" controls></audio>
    <pre id="status"></pre>
  </main>

  <script src="app.js"></script>
</body>
</html>
