<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen3 TTS UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Qwen3 TTS UI</h1>

    <div id="modelStatusBar" class="model-status idle" aria-live="polite">⚪ <strong>Idle</strong></div>

    <label>Text</label>
    <textarea id="text" rows="6" placeholder="Type text to synthesize..."></textarea>

    <div class="mode-switch" id="modeSwitch" role="radiogroup" aria-label="Synthesis mode">
      <button type="button" class="mode-btn active" data-mode="clone" aria-checked="true">Clone</button>
      <button type="button" class="mode-btn inactive" data-mode="design" aria-checked="false">Design</button>
    </div>

    <div class="grid">
      <div>
        <label>Language</label>
        <select id="language"></select>
      </div>
      <div id="selectedRefWrap">
        <label>Selected reference</label>
        <div id="selectedRef" class="selected-ref">None</div>
      </div>
    </div>

    <section id="designSection" class="design-section hidden">
      <label for="voiceDescription">Describe the voice</label>
      <textarea id="voiceDescription" rows="3" placeholder="deep British male, slightly raspy, calm pace"></textarea>
    </section>

    <section id="referenceSection" class="ref-audio">
      <h2>Reference audio</h2>
      <div class="grid">
        <div>
          <label>Use reference file</label>
          <select id="referenceAudio">
            <option value="">None</option>
          </select>
        </div>
        <div>
          <label>Upload new file</label>
          <input id="uploadFile" type="file" accept="audio/*" />
        </div>
      </div>
      <div class="actions">
        <button id="uploadBtn">Upload</button>
        <button id="refreshRefBtn" class="secondary">Refresh list</button>
      </div>
    </section>

    <div class="actions">
      <button id="generateBtn">Generate</button>
      <button id="downloadBtn" class="secondary" disabled>Download</button>
    </div>

    <audio id="player" controls></audio>
    <pre id="status"></pre>
  </main>

  <script src="app.js"></script>
</body>
</html>
