apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-tts-ui
  namespace: sietch-sentia
  labels:
    app: qwen3-tts-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen3-tts-ui
  template:
    metadata:
      labels:
        app: qwen3-tts-ui
    spec:
      nodeSelector:
        kubernetes.io/hostname: arrakeen
      containers:
        - name: ui
          image: ghcr.io/sententia-bot/qwen3-tts-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
