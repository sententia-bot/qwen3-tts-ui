apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qwen3-tts-ui
  namespace: sietch-sentia
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: qwen-ui.sentia.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qwen3-tts-ui
                port:
                  number: 80
    - host: tts.albindalbert.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qwen3-tts-ui
                port:
                  number: 80
  tls:
    - hosts:
        - tts.albindalbert.dev
      secretName: qwen3-tts-ui-tls
